<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#shieldGrad)" filter="url(#shadow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="url(#ringGrad)" stroke-width="8" opacity="0.6"/>

  <!-- Shield shape -->
  <path d="M256 100
           L380 160
           L380 280
           C380 360 330 420 256 440
           C182 420 132 360 132 280
           L132 160
           Z"
        fill="#ffffff"
        opacity="0.95"
        filter="url(#shadow)"/>

  <!-- Shield inner border -->
  <path d="M256 115
           L365 170
           L365 278
           C365 350 320 405 256 422
           C192 405 147 350 147 278
           L147 170
           Z"
        fill="none"
        stroke="#1565c0"
        stroke-width="3"
        opacity="0.3"/>

  <!-- Key icon -->
  <g transform="translate(175, 205) scale(0.85)">
    <!-- Key ring -->
    <circle cx="55" cy="25" r="28" fill="none" stroke="url(#keyGrad)" stroke-width="10"/>
    <circle cx="55" cy="25" r="18" fill="#1a73e8"/>

    <!-- Key shaft -->
    <rect x="72" y="16" width="100" height="18" rx="4" fill="url(#keyGrad)"/>

    <!-- Key teeth -->
    <rect x="155" y="30" width="12" height="16" rx="2" fill="url(#keyGrad)"/>
    <rect x="140" y="30" width="10" height="13" rx="2" fill="url(#keyGrad)"/>
    <rect x="125" y="30" width="10" height="10" rx="2" fill="url(#keyGrad)"/>
  </g>

  <!-- Lock body -->
  <g transform="translate(256, 330)">
    <rect x="-30" y="-5" width="60" height="50" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="4"/>
    <!-- Lock shackle -->
    <path d="M-18 -5 L-18 -22 C-18 -42 18 -42 18 -22 L18 -5"
          fill="none" stroke="#1565c0" stroke-width="6" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="18" r="8" fill="#1a73e8"/>
    <rect x="-3" y="20" width="6" height="14" rx="2" fill="#1a73e8"/>
  </g>

  <!-- PWM text below -->
  <text x="256" y="490" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="#0d47a1" letter-spacing="6">
    PWM
  </text>
</svg>
